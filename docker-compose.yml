services:
  api:
    build: .
    container_name: cloud-ml-genai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.aws
    volumes:
      - .:/app
      - ${HOME}/.aws:/root/.aws
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: cloud-ml-genai-worker
    env_file:
      - .env
      - .env.aws
    volumes:
      - .:/app
      - ${HOME}/.aws:/root/.aws
    command: python -m workers.sqs_worker
    restart: unless-stopped